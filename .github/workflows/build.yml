name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Flutter project
        run: |
          flutter create --org com.example --project-name movie_app temp_project
          rm -rf temp_project/lib
          cp -r lib temp_project/lib
          cp pubspec.yaml temp_project/pubspec.yaml
          cd temp_project
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app-release.apk
